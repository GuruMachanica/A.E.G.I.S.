services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegis-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_PATH: /data/aegis_backend.db
      ASSIST_FAKEVOICE_DIR: /app/app/ml/ASSIST-FAKEVOICE-DETECTION
      ASSIST_TARGET_SAMPLE_RATE: 16000
    volumes:
      - backend_data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    container_name: aegis-caddy
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      AEGIS_DOMAIN: ${AEGIS_DOMAIN:-:80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  backend_data:
  caddy_data:
  caddy_config:
