name: aegis_app
description: "A.E.G.I.S - Total Communication Security"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^3.3.1

  # Navigation
  go_router: ^17.1.0

  # UI / Animations
  flutter_animate: ^4.5.0
  google_fonts: ^8.0.2

  # Auth
  google_sign_in: ^7.2.0

  # Phone field with country code
  intl_phone_field: ^3.2.0

  # Audio
  flutter_sound: ^9.2.13
  permission_handler: ^12.0.1
  speech_to_text: ^7.0.0

  # Networking
  web_socket_channel: ^3.0.3
  http: ^1.2.1

  # Haptics
  vibration: ^3.1.8

  # Persistence
  shared_preferences: ^2.2.3
  sqflite: ^2.4.1
  path: ^1.9.1
  image_picker: ^1.1.2

  # Date formatting
  intl: ^0.20.2
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.6
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/aegis_logo.png
